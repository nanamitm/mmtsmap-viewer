name: Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-x64:
    name: Build Windows x64 package
    runs-on: windows-2022

    env:
      # Pinned to a version the aqtinstall mirrors reliably serve for Windows.
      QT_VERSION: '6.10.1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt for Windows
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        env:
          PACKAGE_NAME: mmtsmap-viewer-${{ github.ref_name || 'dev' }}-win64
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path "package" $env:PACKAGE_NAME
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Copy-Item "build\mmtsmap-viewer.exe" $stage

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" `
            --release --no-translations --no-system-d3d-compiler --no-opengl-sw `
            "$stage\mmtsmap-viewer.exe"

          Copy-Item README.md, LICENSE $stage
          New-Item -ItemType Directory -Force -Path "$stage\samples" | Out-Null
          Copy-Item "samples\*" "$stage\samples"

          $archive = "$env:PACKAGE_NAME.zip"
          Compress-Archive -Path "$stage\*" -DestinationPath $archive -Force
          "WINDOWS_PACKAGE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: ${{ env.WINDOWS_PACKAGE }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.WINDOWS_PACKAGE }}
